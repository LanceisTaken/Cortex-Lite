# PROD nginx config (baked into the multi-stage image).
# Serves the built React SPA statically, proxies /api and /sanctum to PHP-FPM.
# Note: /api/stripe/webhook must have a CloudFront cache-behavior carve-out
# in front of this — see docs/DECISIONS.md and docs/TROUBLESHOOTING.md.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20M;

    # API and Sanctum routes go to PHP-FPM (app container).
    location ~ ^/(api|sanctum)/ {
        try_files $uri /laravel-proxy;
    }

    location = /laravel-proxy {
        internal;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        include fastcgi_params;
    }

    # Everything else: serve the React SPA (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

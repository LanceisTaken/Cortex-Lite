# DEV nginx config. Serves API traffic through PHP-FPM.
# React runs on the host at http://localhost:5173 (Vite dev server) and calls
# this nginx cross-origin with credentials — see CORS config in Laravel.

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 20M;

    # Laravel PHP entrypoint.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
